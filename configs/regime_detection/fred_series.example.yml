# FRED macro panel for the regime-detection macro_rules method.
# Each series is fetched, transformed into a signal comparable across series,
# and contributes to either the growth or inflation axis.
#
# Transforms:
#   level                  raw observation value
#   centered(c)            value - c
#   yoy_pct                100 * (v_t / v_{t-12m} - 1)
#   yoy_diff               v_t - v_{t-12m} (arithmetic)
#   inverted_yoy_diff      -(v_t - v_{t-12m})       # rising unemployment hurts growth
#
# publication_lag_days approximates the delay between observation-period end
# and public release. Applied as: the value for period P is visible on
# period_end(P) + lag_days. Prevents lookahead bias during backtest without
# needing the ALFRED vintage API.

series:
  # --- Growth axis ---
  - series_id: UNRATE
    axis: growth
    transform: inverted_yoy_diff
    weight: 1.0
    publication_lag_days: 7
    title: Unemployment rate (inverted YoY change)
    frequency_hint: monthly

  - series_id: PAYEMS
    axis: growth
    transform: yoy_pct
    weight: 1.0
    publication_lag_days: 7
    title: Non-farm payrolls (YoY %)
    frequency_hint: monthly

  - series_id: INDPRO
    axis: growth
    transform: yoy_pct
    weight: 1.0
    publication_lag_days: 18
    title: Industrial production (YoY %)
    frequency_hint: monthly

  - series_id: RSAFS
    axis: growth
    transform: yoy_pct
    weight: 1.0
    publication_lag_days: 16
    title: Retail sales (YoY %)
    frequency_hint: monthly

  - series_id: USSLIND
    axis: growth
    transform: level
    weight: 1.0
    publication_lag_days: 28
    title: State coincident leading index (diffusion)
    frequency_hint: monthly

  # --- Inflation axis ---
  - series_id: CPIAUCSL
    axis: inflation
    transform: yoy_pct
    weight: 1.0
    publication_lag_days: 14
    title: CPI all items (YoY %)
    frequency_hint: monthly

  - series_id: CPILFESL
    axis: inflation
    transform: yoy_pct
    weight: 1.0
    publication_lag_days: 14
    title: Core CPI (YoY %)
    frequency_hint: monthly

  - series_id: PCEPI
    axis: inflation
    transform: yoy_pct
    weight: 1.0
    publication_lag_days: 30
    title: PCE price index (YoY %)
    frequency_hint: monthly

  - series_id: PCEPILFE
    axis: inflation
    transform: yoy_pct
    weight: 1.0
    publication_lag_days: 30
    title: Core PCE (YoY %)
    frequency_hint: monthly

  - series_id: CORESTICKM159SFRBATL
    axis: inflation
    transform: level
    weight: 1.0
    publication_lag_days: 14
    title: Sticky-price CPI (YoY %, as published)
    frequency_hint: monthly

  - series_id: T5YIFR
    axis: inflation
    transform: level
    weight: 1.0
    publication_lag_days: 1
    title: 5y5y forward inflation expectation
    frequency_hint: daily

  - series_id: AHETPI
    axis: inflation
    transform: yoy_pct
    weight: 0.5
    publication_lag_days: 7
    title: Average hourly earnings (YoY %)
    frequency_hint: monthly
