# Market regime detection config.
# Signals are sourced from a cached Yahoo Finance market panel.
#
# Schema:
#   data_sources.symbols   list of {symbol, alias}
#   normalization          defaults applied when a signal omits its own choice
#   growth.signals         list of MarketSignalSpec entries (axis is implicit)
#   inflation.signals      list of MarketSignalSpec entries
#   risk_overlay.signals   list of MarketSignalSpec entries (axis = "risk")
#                          NOTE: risk-overlay thresholds and hysteresis live in
#                          configs/regime_detection/regime_engine.yml — single
#                          source of truth. This file owns *which signals* feed
#                          the risk score, not the on/off thresholds.
#
# Per-signal fields:
#   transform         return | relative_return | spread | level | change |
#                     realized_vol | raw_sign
#                     (legacy combined tokens level_zscore / change_zscore /
#                     realized_vol_zscore are still accepted; prefer the
#                     decoupled form for new signals)
#   normalization     zscore | minmax | percentile | raw
#                     (defaults to normalization.default when omitted; raw_sign
#                     transform always implies raw)
#   direction         positive | negative
#   weight            float (0 to deactivate without removing the entry)
#   lookback_days     window for return / change / realized_vol
#   zscore_window_days, threshold
#   minmax_lower, minmax_upper, minmax_window_days
#   percentile_window_days

data_sources:
  symbols:
    - {symbol: SPY, alias: SPY}
    - {symbol: QQQ, alias: QQQ}
    - {symbol: IWM, alias: IWM}
    - {symbol: IWF, alias: IWF}        # growth-vs-value (dormant)
    - {symbol: IWD, alias: IWD}        # growth-vs-value (dormant)
    - {symbol: XLK, alias: XLK}
    - {symbol: XLY, alias: XLY}
    - {symbol: XLP, alias: XLP}
    - {symbol: XLI, alias: XLI}
    - {symbol: XLU, alias: XLU}
    - {symbol: XLF, alias: XLF}
    - {symbol: XLB, alias: XLB}        # materials (dormant)
    - {symbol: XLE, alias: XLE}        # energy (dormant)
    - {symbol: XLV, alias: XLV}        # health care (dormant)
    - {symbol: HYG, alias: HYG}
    - {symbol: LQD, alias: LQD}
    - {symbol: AGG, alias: AGG}        # broad bonds (dormant)
    - {symbol: TLT, alias: TLT}
    - {symbol: USO, alias: USO}
    - {symbol: DBE, alias: DBE}
    - {symbol: CPER, alias: CPER}
    - {symbol: DBC, alias: DBC}
    - {symbol: GLD, alias: GLD}
    - {symbol: TIP, alias: TIP}
    - {symbol: IEF, alias: IEF}
    - {symbol: UUP, alias: UUP}        # USD index proxy (dormant)
    - {symbol: ^VIX, alias: VIX}
    - {symbol: ^MOVE, alias: MOVE}

normalization:
  default: zscore
  zscore_window_days: 756
  zscore_clip: 3.0
  minmax_default_window_days: 504
  minmax_default_lower: -1.0
  minmax_default_upper: 1.0
  percentile_default_window_days: 504
  # Smooth bound applied AFTER per-signal normalization so each contribution
  # lands in (-1, 1). Mirrors the macro-side compression so both layers live
  # in the same latent space — the architectural invariant.
  compression: tanh
  compression_k: 2.0

hysteresis:
  min_consecutive_days: 5

# NOTE: risk-overlay thresholds are owned by regime_engine.yml; the block here
# only enumerates signals.

growth:
  signals:
    # --- active ---
    - {name: spy_momentum, symbol: SPY, transform: return, lookback_days: 63, direction: positive, weight: 1.0}
    - {name: qqq_momentum, symbol: QQQ, transform: return, lookback_days: 63, direction: positive, weight: 0.8}
    - {name: small_caps_momentum, symbol: IWM, transform: return, lookback_days: 63, direction: positive, weight: 0.6}
    - {name: discretionary_vs_staples, numerator: XLY, denominator: XLP, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.8}
    - {name: industrials_vs_utilities, numerator: XLI, denominator: XLU, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.7}
    - {name: tech_vs_utilities, numerator: XLK, denominator: XLU, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.7}
    - {name: credit_risk_appetite, numerator: HYG, denominator: LQD, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.8}
    - {name: copper_momentum, symbol: CPER, transform: return, lookback_days: 63, direction: positive, weight: 0.5}
    - {name: defensive_treasury_outperformance, numerator: TLT, denominator: SPY, transform: relative_return, lookback_days: 63, direction: negative, weight: 0.7}
    # --- dormant (weight 0) ---
    - {name: growth_vs_value, numerator: IWF, denominator: IWD, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.0}
    - {name: materials_vs_staples, numerator: XLB, denominator: XLP, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.0}
    - {name: energy_vs_market, numerator: XLE, denominator: SPY, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.0}
    - {name: health_vs_market, numerator: XLV, denominator: SPY, transform: relative_return, lookback_days: 63, direction: negative, weight: 0.0}
    - {name: financials_vs_market, numerator: XLF, denominator: SPY, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.0}
    - {name: bonds_vs_equity, numerator: AGG, denominator: SPY, transform: relative_return, lookback_days: 63, direction: negative, weight: 0.0}

inflation:
  signals:
    # --- active ---
    - {name: oil_momentum, symbol: USO, transform: return, lookback_days: 63, direction: positive, weight: 1.0}
    - {name: energy_basket_momentum, symbol: DBE, transform: return, lookback_days: 63, direction: positive, weight: 0.8}
    - {name: broad_commodity_momentum, symbol: DBC, transform: return, lookback_days: 63, direction: positive, weight: 0.7}
    - {name: tip_vs_nominal_treasury, numerator: TIP, denominator: IEF, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.6}
    - {name: gold_momentum, symbol: GLD, transform: return, lookback_days: 63, direction: positive, weight: 0.3}
    # --- dormant (weight 0) ---
    - {name: usd_strength, symbol: UUP, transform: return, lookback_days: 63, direction: negative, weight: 0.0}
    - {name: gold_vs_usd, numerator: GLD, denominator: UUP, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.0}
    - {name: copper_vs_gold, numerator: CPER, denominator: GLD, transform: relative_return, lookback_days: 63, direction: positive, weight: 0.0}

risk_overlay:
  signals:
    - {name: vix_level, symbol: VIX, transform: level, normalization: zscore, direction: positive, weight: 1.0}
    - {name: move_level, symbol: MOVE, transform: level, normalization: zscore, direction: positive, weight: 0.8}
    - {name: equity_realized_vol, symbol: SPY, transform: realized_vol, normalization: zscore, lookback_days: 21, direction: positive, weight: 0.7}
    - {name: credit_stress, numerator: HYG, denominator: LQD, transform: relative_return, lookback_days: 63, direction: negative, weight: 0.8}
    - {name: flight_to_quality, numerator: TLT, denominator: SPY, transform: relative_return, lookback_days: 21, direction: positive, weight: 0.6}
