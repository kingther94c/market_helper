    title: State coincident leading index (diffusion)
    frequency_hint: monthly

  # ============================================================
  # Growth axis — dormant (weight: 0). Flip weight to activate.
  # ============================================================
  - series_id: T10Y2Y
    axis: growth
    transform: level
    bucket: fast
    direction: positive
    normalization: zscore
    weight: 0.0
    publication_lag_days: 1
    title: 10y - 2y Treasury yield curve (steeper = pro-growth)
