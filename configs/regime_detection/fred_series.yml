# FRED macro panel for the regime-detection macro_regime method.
# Each series is fetched, transformed into a signal comparable across series,
# and contributes to either the growth or inflation axis.
#
# Transforms:
#   level                  raw observation value
#   centered(c)            value - c                       (transform_param: c)
#   yoy_pct                100 * (v_t / v_{t-12m} - 1)
#   yoy_diff               v_t - v_{t-12m}
#   inverted_yoy_diff      -(v_t - v_{t-12m})              # rising unemployment hurts growth
#   mom_pct                100 * (v_t / v_{t-1} - 1)
#   mom_diff               v_t - v_{t-1}
#   qoq_annualized         ((v_t / v_{t-1Q})^4 - 1) * 100
#
# direction maps the transformed value into the axis sign. Use ``negative`` when
# a higher transformed value is bad for the axis (e.g. rising initial claims
# hurts growth).
#
# normalization (per series, falls back to engine.default_normalization):
#   none         pass-through after transform + direction + threshold
#   centered     subtract expanding mean of the signal
#   threshold    divide signed signal by `threshold` (uses absolute units)
#   zscore       rolling z-score with engine or per-series window/clip
#   minmax       rolling min/max scaling into [minmax_lower, minmax_upper]
#   percentile   rolling percentile rank scaled to [-1, 1]
#
# Per-series overrides (any can be omitted to inherit engine defaults):
#   zscore_window_bdays, zscore_min_periods, zscore_clip
#   minmax_lower, minmax_upper, minmax_window_bdays
#   percentile_window_bdays
#
# bucket separates fast and slow macro evidence; engine.bucket_weights weights
# them. publication_lag_days approximates the delay between observation-period
# end and public release; the value for period P becomes visible on
# period_end(P) + lag_days. Prevents lookahead bias during backtests.

engine:
  bucket_weights:
    fast: 0.70
    slow: 0.30
  min_available_bucket_weight: 0.0
  default_normalization: none
  zscore_window_bdays: 2520
  zscore_min_periods: 252
  zscore_clip: 3.0
  minmax_default_window_bdays: 1260
  minmax_default_lower: -1.0
  minmax_default_upper: 1.0
  percentile_default_window_bdays: 1260
  min_consecutive_days: 10
  warmup_bdays: 0

series:
  # ============================================================
  # Growth axis — currently active
  # ============================================================
  - series_id: UNRATE
    axis: growth
    transform: inverted_yoy_diff
    bucket: fast
    direction: positive
    normalization: none
    weight: 1.0
    publication_lag_days: 7
    title: Unemployment rate (inverted YoY change)
    frequency_hint: monthly

  - series_id: PAYEMS
    axis: growth
    transform: yoy_pct
    bucket: fast
    direction: positive
    normalization: none
    weight: 1.0
    publication_lag_days: 7
    title: Non-farm payrolls (YoY %)
    frequency_hint: monthly

  - series_id: INDPRO
    axis: growth
    transform: yoy_pct
    bucket: slow
    direction: positive
    normalization: none
    weight: 1.0
    publication_lag_days: 18
    title: Industrial production (YoY %)
    frequency_hint: monthly

  - series_id: RSAFS
    axis: growth
    transform: yoy_pct
    bucket: fast
    direction: positive
    normalization: none
    weight: 1.0
