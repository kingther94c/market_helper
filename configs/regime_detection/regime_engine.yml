regime_engine:
  version: 2

  layers:
    macro_nowcast:
      enabled: true
      available_required: false
      weight_growth: 0.45
      weight_inflation: 0.40

    market_implied:
      enabled: true
      available_required: false
      weight_growth: 0.55
      weight_inflation: 0.60

    macro_truth_ml:
      enabled: false
      available_required: false
      model_type: svm
      weight_growth: 0.00
      weight_inflation: 0.00

    return_truth_ml:
      enabled: false
      available_required: false
      model_type: svm
      weight_growth: 0.00
      weight_inflation: 0.00

  risk_overlay:
    enabled: true
    independent: true
    enter_threshold: 0.75
    exit_threshold: 0.55
    min_consecutive_days: 3

  regime_thresholds:
    # Lowered from 0.35 / 0.50 after macro+market both moved to tanh-compressed
    # (-1, 1). With both layers in the same latent space the final score is
    # also bounded; ±0.20 puts the threshold at roughly the abs-p25 of the new
    # distribution and keeps the Up/Down regions interesting.
    growth_up: 0.20
    growth_down: -0.20
    inflation_up: 0.20
    inflation_down: -0.20
    # Require this many consecutive bdays past the threshold before flipping
    # the axis state (Up / Neutral/Mixed / Down). Cuts whipsaw turnover —
    # without this hysteresis the median regime run was 3 bdays.
    min_consecutive_days: 5

  confidence:
    # Tightened to match the post-Q3 (-1, 1) score scale — old 0.35/0.75
    # thresholds rarely fired now that macro is no longer wide-tailed.
    enabled: true
    score_strength_thresholds:
      medium: 0.20
      high: 0.45
    disagreement_penalty: true

  disagreement:
    enabled: true
    strong_disagreement_threshold: 0.70
