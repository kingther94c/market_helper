regime_engine:
  version: 2

  layers:
    macro_nowcast:
      enabled: true
      available_required: false
      # Q8 (2026-05-22): macro layer hydrated with full FRED panel for the
      # first time; balanced 50/50 blend tested by 162-run grid wins on
      # overall consensus match (+11pp growth axis, +5pp overall vs
      # Q6/Q7 baseline at 35/30 macro + 65/70 market). Report:
      # data/research_artifacts/macro_calibration_report.html
      weight_growth: 0.50
      weight_inflation: 0.50

    market_implied:
      enabled: true
      available_required: false
      weight_growth: 0.50
      weight_inflation: 0.50

    macro_truth_ml:
      enabled: false
      available_required: false
      model_type: svm
      weight_growth: 0.00
      weight_inflation: 0.00

    return_truth_ml:
      enabled: false
      available_required: false
      model_type: svm
      weight_growth: 0.00
      weight_inflation: 0.00

  risk_overlay:
    enabled: true
    independent: true
    # Calibration 2026-05-22 (grid search across 4 anchors): lowered
    # enter_threshold 0.75 -> 0.65 and min_consecutive_days 3 -> 1. Under
    # the old setting the overlay fired ~25 bdays late on Lehman day and
    # never on the critical day of any anchor; under the new setting it
    # fires same-day on Lehman, within 1-3 bdays on COVID waterfall and
    # Liberation Day. Benign false-positive rate rises from 3.0% to 6.4%
    # (~3 extra muted-stress days per benign year). Report:
    # data/research_artifacts/calibration_report.html
    enter_threshold: 0.65
    exit_threshold: 0.55
    min_consecutive_days: 1

  regime_thresholds:
    # Q8 (2026-05-22): tightened growth deadband from ±0.15 to ±0.10. The
    # 162-config grid (macro now FRED-hydrated) showed the tighter
    # growth threshold lifts 2017 Goldilocks +45pp, 2010-12 expansion
    # +24pp, 2021 reflation +28pp, 2022 H1 inflation +30pp — periods
    # where the model's score legitimately moved above the prior ±0.15
    # but only marginally. Inflation deadband (±0.12) and hysteresis (5)
    # kept from Q6 — already optimal in the grid.
    growth_up: 0.10
    growth_down: -0.10
    inflation_up: 0.12
    inflation_down: -0.12
    # Require this many consecutive bdays past the threshold before flipping
    # the axis state (Up / Neutral/Mixed / Down). Cuts whipsaw turnover —
    # without this hysteresis the median regime run was 3 bdays.
    min_consecutive_days: 5

  confidence:
    # Tightened to match the post-Q3 (-1, 1) score scale — old 0.35/0.75
    # thresholds rarely fired now that macro is no longer wide-tailed.
    enabled: true
    score_strength_thresholds:
      medium: 0.20
      high: 0.45
    disagreement_penalty: true

  disagreement:
    enabled: true
    strong_disagreement_threshold: 0.70
