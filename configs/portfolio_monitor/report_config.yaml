risk_report:
  lookthrough:
    eq_country: eq_country_lookthrough.csv
    us_sector: us_sector_lookthrough.json
  proxy:
    DEFAULT: VIX
    defaults:
      VIX: 18.0
      MOVE: 110.0
      OVX: 25.0
      GVZ: 25.0
      MACRO: 13.0
    yahoo:
      symbols:
        VIX: ^VIX
        MOVE: ^MOVE
        OVX: ^OVX
        GVZ: ^GVZ
      period: 5d
      interval: 1d
  volatility:
    trading_days: 252
    short_window_days: 21
    long_window_days: 63
    long_term_lookback_years: 5
    cash_vol_override: 0
    fx_vol_override: 0
  # Maps dashboard toggle labels to internal vol-method keys. Order
  # in this mapping defines the toggle option order.
  vol_method_labels:
    Long-Term: 5y_realized
    Fast: geomean_1m_3m
    Forward-Looking: forward_looking
  fx_excluded_asset_classes:
    - FX
    - CASH
  # Commodity dashboard: proxy ETF per sector for the cross-sector
  # correlation heatmap. Keys match cm_sector codes in security_universe.csv.
  commodity_sector_proxies:
    PM: GLD
    IM: DBB
    EN: USO
    AG: DBA
  commodity_sector_correlation_lookback_days: 1260
  fixed_income:
    fi_10y_eq_mod_duration: 8.0
    move_to_yield_vol_factor: 0.0001
  policy:
    portfolio_asset_class_targets:
      EQ: 0.80
      FI: 1.0
      FX: 1.0
      CASH: 0.025
      CM: 0.10
      MACRO: 0.075
    equity_country_policy_mix:
      ACWI: 1.0
    us_equity_sector_policy_mix:
      SPY: 1.0
